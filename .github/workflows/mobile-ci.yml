name: Mobile CI/CD

on:
  push:
    branches: 
      - mobile-release                   # Production APK
      - main                             # Debug APK (for reference)
      - 'feature/mobile-*'               # Feature branches
      - 'feature/*mobile*'               # Any branch with mobile
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  
  pull_request:
    branches: [main, mobile-release]
    paths:
      - 'mobile/**'
  
  workflow_dispatch:

jobs:
  # ==========================================
  # STAGE 1: Static Analysis
  # ==========================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./mobile

      - name: Android Lint
        run: ./gradlew lintUatDebug
        working-directory: ./mobile
        continue-on-error: true

      - name: Detekt
        run: ./gradlew detekt
        working-directory: ./mobile
        continue-on-error: true

      - name: Ktlint
        run: ./gradlew ktlintCheck
        working-directory: ./mobile
        continue-on-error: true

      - name: Upload Lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: mobile/app/build/reports/lint-results*
          if-no-files-found: warn
          retention-days: 30

  # ==========================================
  # STAGE 2: Unit Tests
  # ==========================================
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./mobile

      - name: Run Unit Tests
        run: ./gradlew testUatDebugUnitTest
        working-directory: ./mobile

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReportDebug
        working-directory: ./mobile
        continue-on-error: true

      - name: Upload Test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: mobile/app/build/reports/tests/testUatDebugUnitTest/
          if-no-files-found: warn
          retention-days: 30

  # ==========================================
  # STAGE 3: Build APK (Conditional)
  # ==========================================
  build-debug-apk:
    name: Build UAT Debug APK
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: github.ref != 'refs/heads/mobile-release'  # NOT on mobile-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./mobile

      - name: Build UAT Debug APK
        run: ./gradlew assembleUatDebug
        working-directory: ./mobile

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.ref_name }}
          path: mobile/app/build/outputs/apk/uat/debug/*.apk
          retention-days: 30

  # ==========================================
  # STAGE 4: Build Production APK (mobile-release only)
  # ==========================================
  build-production-apk:
    name: Build Production APK
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: github.ref == 'refs/heads/mobile-release'
    environment: production-mobile  # Optional: separate approval for mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./mobile

      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > mobile/app/release.keystore
        continue-on-error: true

      - name: Build Production Release APK
        run: ./gradlew assembleProductionRelease
        working-directory: ./mobile
        continue-on-error: true

      - name: Build Production Release AAB
        run: ./gradlew bundleProductionRelease
        working-directory: ./mobile
        continue-on-error: true

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-apk
          path: mobile/app/build/outputs/apk/production/release/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Production AAB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-aab
          path: mobile/app/build/outputs/bundle/productionRelease/*.aab
          retention-days: 90
          if-no-files-found: warn

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "versionName" mobile/app/build.gradle.kts | awk '{print $3}' | tr -d '"' || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: mobile-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Mobile v${{ steps.version.outputs.version }} Build ${{ github.run_number }}
          body: |
            Production mobile release
            Version: ${{ steps.version.outputs.version }}
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
          files: |
            mobile/app/build/outputs/apk/production/release/*.apk
            mobile/app/build/outputs/bundle/productionRelease/*.aab
          draft: false
          prerelease: false
        continue-on-error: true
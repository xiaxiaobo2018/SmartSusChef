# .github/workflows/mobile-ci.yml

name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'

jobs:
  build-and-test:
    name: Build, Test & Export APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./mobile

      - name: Lint with Android Lint
        run: ./gradlew lint
        working-directory: ./mobile
        continue-on-error: true

      - name: Detekt static analysis
        run: ./gradlew detekt
        working-directory: ./mobile
        continue-on-error: true

      - name: Ktlint check
        run: ./gradlew ktlintCheck
        working-directory: ./mobile
        continue-on-error: true

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest
        working-directory: ./mobile

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: ./mobile

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: mobile/app/build/reports/lint-results*.html
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Detekt report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: mobile/app/build/reports/detekt/*.html
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: mobile/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn
          retention-days: 30

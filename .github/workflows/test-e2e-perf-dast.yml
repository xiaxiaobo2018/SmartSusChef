name: "Manual: E2E / JMeter / DAST Tests"

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E Playwright tests'
        type: boolean
        default: true
      run_jmeter:
        description: 'Run JMeter performance tests'
        type: boolean
        default: true
      run_dast:
        description: 'Run OWASP ZAP DAST scan'
        type: boolean
        default: true
      target_url:
        description: 'Target ALB URL (without trailing slash)'
        type: string
        default: 'http://smartsuschef-uat-alb-374711244.ap-southeast-1.elb.amazonaws.com'

env:
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'

permissions:
  contents: read
  security-events: write

jobs:
  # ==========================================
  # E2E Tests with Playwright
  # ==========================================
  e2e-tests-playwright:
    name: "E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    if: ${{ inputs.run_e2e }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright dependencies
        run: |
          cd frontend
          npm ci
          npm install -D @playwright/test
          npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ inputs.target_url }}
        run: |
          cd frontend
          npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # ==========================================
  # Performance Tests with JMeter
  # ==========================================
  performance-tests-jmeter:
    name: "Performance Tests (JMeter)"
    runs-on: ubuntu-latest
    if: ${{ inputs.run_jmeter }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$(pwd)/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Extract host from URL
        id: parse-url
        run: |
          URL="${{ inputs.target_url }}"
          HOST=$(echo "$URL" | sed -E 's|https?://||' | sed 's|/.*||')
          echo "host=$HOST" >> $GITHUB_OUTPUT

      - name: Run JMeter tests
        run: |
          jmeter -n \
            -t tests/jmeter/load-test.jmx \
            -l results.jtl \
            -e -o reports/ \
            -Jhost=${{ steps.parse-url.outputs.host }} \
            -Jport=80 \
            -Jthreads=10 \
            -Jduration=60
        continue-on-error: true

      - name: Check Apdex score
        run: |
          python3 << 'EOF'
          import csv
          
          threshold_ms = 500
          satisfied = tolerating = frustrated = 0
          total_requests = 0
          success_count = 0
          error_count = 0
          
          try:
              with open('results.jtl', 'r') as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      try:
                          total_requests += 1
                          elapsed = int(row['elapsed'])
                          is_success = row.get('success', 'true').lower() == 'true'
                          if is_success:
                              success_count += 1
                          else:
                              error_count += 1
                          
                          if elapsed <= threshold_ms:
                              satisfied += 1
                          elif elapsed <= 4 * threshold_ms:
                              tolerating += 1
                          else:
                              frustrated += 1
                      except (KeyError, ValueError):
                          continue
              
              total = satisfied + tolerating + frustrated
              if total > 0:
                  apdex = (satisfied + tolerating/2) / total
                  error_rate = (error_count / total_requests * 100) if total_requests > 0 else 0
                  
                  print(f"=== JMeter Performance Summary ===")
                  print(f"Total Requests: {total_requests}")
                  print(f"Successful: {success_count}, Failed: {error_count}")
                  print(f"Error Rate: {error_rate:.1f}%")
                  print(f"")
                  print(f"Apdex Score: {apdex:.3f} (threshold: {threshold_ms}ms)")
                  print(f"  Satisfied (<={threshold_ms}ms): {satisfied}")
                  print(f"  Tolerating (<={4*threshold_ms}ms): {tolerating}")
                  print(f"  Frustrated (>{4*threshold_ms}ms): {frustrated}")
                  
                  if apdex < 0.85:
                      print(f"\nWARNING: Apdex score {apdex:.3f} below threshold (0.85)")
                  else:
                      print(f"\nOK: Apdex score {apdex:.3f} meets threshold (0.85)")
              else:
                  print("No valid results found in results.jtl")
          except FileNotFoundError:
              print("Results file not found - JMeter may have failed to run")
          EOF

      - name: Upload JMeter reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-reports
          path: |
            results.jtl
            reports/
          retention-days: 30

  # ==========================================
  # DAST Security Scan with OWASP ZAP
  # ==========================================
  dast-owasp-zap:
    name: "DAST Scan (OWASP ZAP)"
    runs-on: ubuntu-latest
    if: ${{ inputs.run_dast }}
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan (Frontend)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -m 5 -T 60'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zap-baseline-report'
        continue-on-error: true

      - name: ZAP API Scan (Backend)
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: '${{ inputs.target_url }}/api'
          format: 'openapi'
          cmd_options: '-a -j -m 5 -T 60'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zap-api-report'
        continue-on-error: true

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 30

  # ==========================================
  # Summary
  # ==========================================
  summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: [e2e-tests-playwright, performance-tests-jmeter, dast-owasp-zap]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Manual Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ inputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Playwright | ${{ needs.e2e-tests-playwright.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JMeter Performance | ${{ needs.performance-tests-jmeter.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP DAST | ${{ needs.dast-owasp-zap.result }} |" >> $GITHUB_STEP_SUMMARY

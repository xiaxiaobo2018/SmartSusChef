name: "Manual: E2E / JMeter / DAST Tests"

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E Playwright tests'
        type: boolean
        default: true
      run_jmeter:
        description: 'Run JMeter performance tests'
        type: boolean
        default: true
      run_dast:
        description: 'Run OWASP ZAP DAST scan'
        type: boolean
        default: true
      target_url:
        description: 'Target ALB URL (without trailing slash)'
        type: string
        default: 'http://smartsuschef-uat-alb-374711244.ap-southeast-1.elb.amazonaws.com'
      db_environment:
        description: 'Database environment for JMeter tests'
        type: choice
        options:
          - production
          - uat
        default: 'uat'

env:
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'

permissions:
  contents: read
  security-events: write

jobs:
  # ==========================================
  # E2E Tests with Playwright
  # ==========================================
  e2e-tests-playwright:
    name: "E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    if: ${{ inputs.run_e2e }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright dependencies
        run: |
          cd frontend
          npm ci
          npm install -D @playwright/test
          npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ inputs.target_url }}
        run: |
          cd frontend
          npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # ==========================================
  # Performance Tests with JMeter
  # ==========================================
  performance-tests-jmeter:
    name: "Performance Tests (JMeter)"
    runs-on: ubuntu-latest
    if: ${{ inputs.run_jmeter }}
    environment:
      name: uat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$(pwd)/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Extract host and port from URL
        id: parse-url
        run: |
          URL="${{ inputs.target_url }}"
          HOST=$(echo "$URL" | sed -E 's|https?://||' | sed 's|:[0-9]*||' | sed 's|/.*||')
          PORT=$(echo "$URL" | grep -oP ':\K[0-9]+' || true)
          if [ -z "$PORT" ]; then
            if echo "$URL" | grep -q "^https"; then PORT=443; else PORT=80; fi
          fi
          echo "host=$HOST" >> $GITHUB_OUTPUT
          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "Parsed host=$HOST, port=$PORT from $URL"

      - name: Clean test data via API
        run: |
          echo "--- Clearing test data via backend API ---"
          TARGET_URL="${{ inputs.target_url }}"

          # Login to get JWT token (Manager role required for delete)
          echo "Attempting login at $TARGET_URL/api/Auth/login ..."
          HTTP_CODE=$(curl -s -o /tmp/login_resp.json -w "%{http_code}" -X POST "$TARGET_URL/api/Auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.ZAP_DAST_USERNAME }}\",\"password\":\"${{ secrets.ZAP_DAST_PASSWORD }}\"}" 2>/dev/null) || true
          echo "Login HTTP status: $HTTP_CODE"

          TOKEN=$(jq -r '.token // empty' /tmp/login_resp.json 2>/dev/null || echo "")

          if [ -z "$TOKEN" ]; then
            echo "::warning::Login failed (HTTP $HTTP_CODE) — skipping test data cleanup"
            cat /tmp/login_resp.json 2>/dev/null || true
            exit 0
          fi
          echo "✅ Login successful (token length: ${#TOKEN})"
          AUTH="Authorization: Bearer $TOKEN"

          # 1) Delete wastage data linked to test ingredients
          echo "--- Fetching ingredients to find test data ---"
          INGREDIENTS=$(curl -sf -H "$AUTH" "$TARGET_URL/api/Ingredients" 2>/dev/null || echo "[]")
          TEST_ING_IDS=$(echo "$INGREDIENTS" | jq -r '.[] | select(.name | test("^Test Ingredient ")) | .id' 2>/dev/null)

          if [ -n "$TEST_ING_IDS" ]; then
            WASTAGE=$(curl -sf -H "$AUTH" "$TARGET_URL/api/Wastage" 2>/dev/null || echo "[]")
            for ing_id in $TEST_ING_IDS; do
              WASTE_IDS=$(echo "$WASTAGE" | jq -r --arg iid "$ing_id" '.[] | select(.ingredientId == $iid) | .id' 2>/dev/null)
              for wid in $WASTE_IDS; do
                curl -sf -X DELETE -H "$AUTH" "$TARGET_URL/api/Wastage/$wid" -o /dev/null 2>/dev/null && echo "  Deleted wastage $wid" || true
              done
            done
            echo "✅ Cleared related wastage data"

            # 2) Delete test ingredients
            for id in $TEST_ING_IDS; do
              curl -sf -X DELETE -H "$AUTH" "$TARGET_URL/api/Ingredients/$id" -o /dev/null 2>/dev/null && echo "  Deleted ingredient $id" || true
            done
            echo "✅ Deleted test ingredients"
          else
            echo "No test ingredients found"
          fi

          # 3) Delete test recipes
          echo "--- Fetching recipes to find test data ---"
          RECIPES=$(curl -sf -H "$AUTH" "$TARGET_URL/api/Recipes" 2>/dev/null || echo "[]")
          TEST_REC_IDS=$(echo "$RECIPES" | jq -r '.[] | select(.name | test("^Test Recipe ")) | .id' 2>/dev/null)

          if [ -n "$TEST_REC_IDS" ]; then
            for id in $TEST_REC_IDS; do
              curl -sf -X DELETE -H "$AUTH" "$TARGET_URL/api/Recipes/$id" -o /dev/null 2>/dev/null && echo "  Deleted recipe $id" || true
            done
            echo "✅ Deleted test recipes"
          else
            echo "No test recipes found"
          fi

          echo "--- Test data cleanup complete ---"
        continue-on-error: true

      - name: Run JMeter tests
        run: |
          RESULTS_DIR="$(pwd)/testing/performance/results"
          REPORT_DIR="$(pwd)/testing/performance/reports/Final_Run_Report"
          RESULTS_FILE="$RESULTS_DIR/Final_Run_UAT.jtl"

          rm -rf "$REPORT_DIR" "$RESULTS_FILE"
          mkdir -p "$REPORT_DIR" "$RESULTS_DIR"

          # Generate credentials CSV from secrets
          echo "username,password" > testing/performance/data/user.csv
          echo "${{ secrets.ZAP_DAST_USERNAME }},${{ secrets.ZAP_DAST_PASSWORD }}" >> testing/performance/data/user.csv

          cd testing/performance
          jmeter -n \
            -t jmx/Main_Scenario.jmx \
            -l "$RESULTS_FILE" \
            -e -o "$REPORT_DIR" \
            -Jtarget_host=${{ steps.parse-url.outputs.host }} \
            -Jtarget_port=${{ steps.parse-url.outputs.port }} \
            -f
        continue-on-error: true

      - name: JMeter results summary
        if: always()
        run: |
          RESULTS_FILE="testing/performance/results/Final_Run_UAT.jtl"
          echo "## Performance Tests (JMeter)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f "$RESULTS_FILE" ]; then
            echo "⚠️ Results file not found — JMeter may have failed to run." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          python3 << 'PYEOF'
          import csv, os

          threshold_ms = 500
          satisfied = tolerating = frustrated = 0
          total_requests = success_count = error_count = 0

          try:
              with open("testing/performance/results/Final_Run_UAT.jtl", "r") as f:
                  for row in csv.DictReader(f):
                      try:
                          total_requests += 1
                          elapsed = int(row["elapsed"])
                          if row.get("success", "true").lower() == "true":
                              success_count += 1
                          else:
                              error_count += 1
                          if elapsed <= threshold_ms:
                              satisfied += 1
                          elif elapsed <= 4 * threshold_ms:
                              tolerating += 1
                          else:
                              frustrated += 1
                      except (KeyError, ValueError):
                          continue

              total = satisfied + tolerating + frustrated
              if total > 0:
                  apdex = (satisfied + tolerating / 2) / total
                  error_rate = error_count / total_requests * 100 if total_requests else 0
                  summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
                  with open(summary, "a") as s:
                      s.write("| Metric | Value |\n|--------|-------|\n")
                      s.write(f"| Total Requests | {total_requests} |\n")
                      s.write(f"| ✅ Successful | {success_count} |\n")
                      s.write(f"| ❌ Failed | {error_count} |\n")
                      s.write(f"| Error Rate | {error_rate:.1f}% |\n")
                      s.write(f"| **Apdex Score** | **{apdex:.3f}** (threshold: {threshold_ms}ms) |\n")
                      s.write(f"| Satisfied (<={threshold_ms}ms) | {satisfied} |\n")
                      s.write(f"| Tolerating (<={4*threshold_ms}ms) | {tolerating} |\n")
                      s.write(f"| Frustrated (>{4*threshold_ms}ms) | {frustrated} |\n\n")
                      if apdex < 0.85:
                          s.write(f"⚠️ Apdex score {apdex:.3f} below threshold (0.85)\n")
                      else:
                          s.write(f"✅ Apdex score {apdex:.3f} meets threshold (0.85)\n")
                      if error_rate > 50:
                          s.write(f"⚠️ High error rate {error_rate:.1f}%\n")
                  print(f"Apdex: {apdex:.3f}, Total: {total_requests}, Errors: {error_count}")
              else:
                  print("No valid results found")
          except FileNotFoundError:
              print("Results file not found")
          PYEOF

      - name: Upload JMeter reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-reports
          path: |
            testing/performance/results/Final_Run_UAT.jtl
            testing/performance/reports/Final_Run_Report/
          retention-days: 30

  # ==========================================
  # DAST Security Scan with OWASP ZAP (Authenticated)
  # ==========================================
  dast-owasp-zap:
    name: "DAST Scan (OWASP ZAP)"
    runs-on: ubuntu-latest
    if: ${{ inputs.run_dast }}
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare ZAP workspace
        run: |
          mkdir -p zap-reports
          chmod -R 777 zap-reports
          chmod 777 .

      - name: Login to get JWT token
        id: auth
        run: |
          echo "Logging in to backend API..."
          RESPONSE=$(curl -sf -X POST "${{ inputs.target_url }}/api/Auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.ZAP_DAST_USERNAME }}\",\"password\":\"${{ secrets.ZAP_DAST_PASSWORD }}\"}" 2>&1) || true
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::warning::Login failed — DAST scan will run without authentication (reduced coverage)"
            echo "authenticated=false" >> $GITHUB_OUTPUT
          else
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
            echo "authenticated=true" >> $GITHUB_OUTPUT
            echo "Login successful, token length: ${#TOKEN}"
          fi

      - name: ZAP Baseline Scan (Frontend)
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable -q
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t '${{ inputs.target_url }}' \
            -c '.zap/rules.tsv' \
            -J zap-reports/baseline-report.json \
            -w zap-reports/baseline-report.md \
            -r zap-reports/baseline-report.html \
            -a -j -m 5 -T 60 || true
        continue-on-error: true

      - name: ZAP API Scan (Backend - Authenticated)
        env:
          ZAP_AUTH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host \
            -e ZAP_AUTH_TOKEN="$ZAP_AUTH_TOKEN" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t '${{ inputs.target_url }}/swagger/v1/swagger.json' \
            -f openapi \
            --hook '/zap/wrk/.zap/auth-hook.py' \
            -c '.zap/rules.tsv' \
            -z '-addoninstall replacer' \
            -J zap-reports/api-report.json \
            -w zap-reports/api-report.md \
            -r zap-reports/api-report.html \
            -a -j -m 10 -T 120 || true
        continue-on-error: true

      - name: Verify DAST Coverage
        if: always()
        run: |
          echo "## DAST Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Authenticated:** ${{ steps.auth.outputs.authenticated }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ALL_CONTROLLERS="Auth Dashboard Export Forecast Health Ingredients Ml Recipes Sales Store Users Wastage"
          COVERED=0
          TOTAL=0

          if [ -f zap-reports/api-report.json ]; then
            echo "| Controller | Covered |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|---------|" >> $GITHUB_STEP_SUMMARY
            for ctrl in $ALL_CONTROLLERS; do
              TOTAL=$((TOTAL + 1))
              if grep -qi "/api/$ctrl" zap-reports/api-report.json 2>/dev/null; then
                echo "| $ctrl | ✅ |" >> $GITHUB_STEP_SUMMARY
                COVERED=$((COVERED + 1))
              else
                echo "| $ctrl | ❌ |" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Coverage: $COVERED / $TOTAL controllers**" >> $GITHUB_STEP_SUMMARY

            HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' zap-reports/api-report.json 2>/dev/null || echo 0)
            MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' zap-reports/api-report.json 2>/dev/null || echo 0)
            LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' zap-reports/api-report.json 2>/dev/null || echo 0)
            INFO=$(jq '[.site[].alerts[] | select(.riskcode == "0")] | length' zap-reports/api-report.json 2>/dev/null || echo 0)

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Alert Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟡 Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔵 Info | $INFO |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ API report not generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports
          path: zap-reports/
          retention-days: 30

  # ==========================================
  # Summary
  # ==========================================
  summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: [e2e-tests-playwright, performance-tests-jmeter, dast-owasp-zap]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Manual Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ inputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Playwright | ${{ needs.e2e-tests-playwright.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JMeter Performance | ${{ needs.performance-tests-jmeter.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP DAST | ${{ needs.dast-owasp-zap.result }} |" >> $GITHUB_STEP_SUMMARY